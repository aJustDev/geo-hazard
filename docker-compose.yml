# Compose de desarrollo: solo la base de datos. La API corre en el host con
# `uv run uvicorn app.main:app --reload --log-config log_config.json` (el
# --log-config activa los logs JSON con request-id, ADR-0019). Puerto 5433 para
# convivir con otras instancias locales de Postgres.
services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: geohazard
      POSTGRES_PASSWORD: geohazard
      POSTGRES_DB: geohazard_dev
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - geohazard_pgdata:/var/lib/postgresql/data

volumes:
  geohazard_pgdata:
