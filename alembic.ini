# Config de Alembic para geo-hazard.
# La URL de la BD se lee desde settings.DATABASE_URL en migrations/env.py,
# no desde este fichero (el valor de abajo es un placeholder).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os

# <rev>_<slug>.py
file_template = %%(rev)s_%%(slug)s

sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
